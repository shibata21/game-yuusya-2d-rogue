<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迷宮を守る</title>
  </head>
  <body>
    <div id="app">
      <div class="game-screen" id="gameScreen">
        <div class="crown">
          <div class="tag">迷宮防衛タワーディフェンス</div>
          <h1>迷宮を守る</h1>
          <div class="tag">― 魔物を呼び、冒険者を阻め ―</div>
        </div>

        <div class="hud">
          <div class="core-line">
            <span class="lab">迷宮コア</span>
            <div class="bar"><i id="coreFill"></i><span class="num" id="coreNum">150 / 150</span></div>
          </div>
          <div class="hud-actions hidden" id="hudActions">
            <button type="button" id="statusToggleBtn" aria-expanded="false" aria-controls="equipmentStatusPanel">ステータス</button>
            <button type="button" id="quitRunBtn">やめる</button>
          </div>
          <div class="stats">
            <div class="stat gold"><b id="nutNum">25</b><span class="k">栄養</span></div>
            <div class="stat"><b id="waveNum">0</b><span class="k">ウェーブ</span></div>
            <div class="stat"><b id="monNum">0</b><span class="k">魔物</span></div>
          </div>
          <div class="stat"><b id="scoreNum">0</b><span class="k">スコア</span></div>
          <div class="equipment-status hidden" id="equipmentStatusPanel" aria-label="装備ステータス"></div>
          <div class="items equipment-slots" id="itemBar"><span class="item-empty">装備なし</span></div>
          <div class="hud-message hidden" id="hudMessage" aria-live="polite"></div>
        </div>
        <div class="item-popup hidden" id="itemPopup" role="tooltip" aria-live="polite"></div>

        <div class="stage">
          <div id="game-root"></div>
          <div class="load-overlay" id="loadOverlay" aria-live="polite">
            <div class="load-bar"><i id="loadFill"></i></div>
            <span id="loadText">読み込み中 0%</span>
            <button class="btn-load-retry hidden" id="loadRetryBtn" type="button">再読み込み</button>
          </div>
          <div class="dialogue-overlay hidden" id="dialogueOverlay" role="dialog" aria-live="polite" aria-label="会話">
            <button class="dialogue-box" id="dialogueAdvanceBtn" type="button">
              <span class="dialogue-portrait" id="dialoguePortrait" aria-hidden="true"></span>
              <span class="dialogue-body">
                <span class="dialogue-topic" id="dialogueTopic">会話</span>
                <span class="dialogue-speaker" id="dialogueSpeaker"></span>
                <span class="dialogue-text" id="dialogueText"></span>
                <span class="dialogue-foot">
                  <span id="dialogueProgress">1 / 1</span>
                  <span id="dialogueNext">次へ</span>
                </span>
              </span>
            </button>
          </div>
          <div class="overlay" id="startOverlay">
            <div class="start-panel home-panel" id="startTitlePanel">
              <div class="home-head">
                <div class="home-coin">コイン <b id="homeCoinNum">0</b></div>
                <div class="home-message" id="homeMessage"></div>
              </div>
              <div class="home-tabs" role="tablist" aria-label="ホームメニュー">
                <button type="button" data-home-tab="defense">防衛</button>
                <button type="button" data-home-tab="deck">モンスターデッキ</button>
                <button type="button" data-home-tab="codex">図鑑</button>
                <button type="button" data-home-tab="settings">設定</button>
              </div>
              <div class="home-body" id="homeBody"></div>
              <button class="btn-start" id="startBtn" type="button" disabled aria-busy="true">素材を読み込み中…</button>
            </div>
          </div>

          <div class="overlay dead hidden" id="deadOverlay">
            <h2>迷宮コア、陥落</h2>
            <div class="res">到達ウェーブ <b id="deadWave">0</b><br>討ち取った冒険者 <b id="deadKills">0</b><br>最終スコア <b id="deadScore">0</b></div>
            <button class="btn-start" id="restartBtn">再び守り直す</button>
          </div>

          <div class="overlay clear hidden" id="clearOverlay">
            <h2>迷宮、防衛成功</h2>
            <div class="res"><span id="clearWaveLabel">15ウェーブ突破</span><br>討ち取った冒険者 <b id="clearKills">0</b><br>最終スコア <b id="clearScore">0</b></div>
            <button class="btn-start" id="clearRestartBtn">もう一度守る</button>
          </div>

          <div class="overlay item-choice hidden" id="itemChoiceOverlay">
            <h2>装備を見つけた</h2>
            <div class="item-choice-grid" id="itemChoiceGrid"></div>
            <button class="btn-skip-item" id="skipItemBtn" type="button">取らない</button>
          </div>

          <div class="overlay item-shop hidden" id="itemShopOverlay">
            <h2>装備商店</h2>
            <div class="item-shop-grid" id="itemShopGrid"></div>
            <button class="btn-close-shop" id="closeShopBtn" type="button">店へ戻る</button>
          </div>

          <div class="overlay equipment-compare hidden" id="equipmentCompareOverlay" role="dialog" aria-modal="true" aria-labelledby="equipmentCompareTitle">
            <h2 id="equipmentCompareTitle">装備を入れ替える</h2>
            <div class="equipment-compare-body" id="equipmentCompareBody"></div>
            <div class="equipment-compare-actions">
              <button class="btn-confirm-replace" id="confirmReplaceBtn" type="button">入れ替える</button>
              <button class="btn-back-choices" id="backToItemChoicesBtn" type="button">選択肢へ戻る</button>
            </div>
          </div>

          <div class="overlay quit-confirm hidden" id="quitConfirmOverlay" role="dialog" aria-modal="true" aria-labelledby="quitConfirmTitle">
            <h2 id="quitConfirmTitle">防衛をやめますか？</h2>
            <p>この防衛の報酬は受け取れません。発見済みの記録は残ります。</p>
            <div class="quit-confirm-actions">
              <button class="btn-confirm-quit" id="confirmQuitBtn" type="button">やめる</button>
              <button class="btn-cancel-quit" id="cancelQuitBtn" type="button">防衛へ戻る</button>
            </div>
          </div>

          <div class="overlay debuff-notice hidden" id="debuffNoticeOverlay">
            <h2>背負わされた罠</h2>
            <div class="debuff-notice-body" id="debuffNoticeBody"></div>
            <button class="btn-ack-debuff" id="ackDebuffBtn" type="button">防衛を続ける</button>
          </div>

          <div class="overlay trap-choice hidden" id="trapChoiceOverlay">
            <h2>ギルド参謀の罠</h2>
            <div class="trap-choice-grid" id="trapChoiceGrid"></div>
          </div>
        </div>

        <div class="controls">
          <div class="wavebox">
            <span class="t" id="waveLabel">次の襲来まで</span>
            <span class="v" id="waveTimer">--</span>
          </div>
          <button class="btn-taunt" id="tauntBtn">すぐ襲来<br>待ち時間を短縮</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
